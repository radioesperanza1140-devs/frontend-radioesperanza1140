# .github/workflows/deploy.yml (Repo del Frontend Angular)
name: 🚀 Deploy Angular to cPanel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build Angular (production)
        run: npm run build -- --configuration production

      - name: 📂 Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_HOST }}
          username: ${{ vars.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Adjust this path to match your angular.json outputPath
          local-dir: ./dist/web-radioesperanza-1140/browser/
          server-dir: ${{ secrets.FRONTEND_PATH }}/
          dangerous-clean-slate: false

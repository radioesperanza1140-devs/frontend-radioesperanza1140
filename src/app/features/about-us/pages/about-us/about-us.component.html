<div class="snap-container">
  <div class="container_cover">
    <img
      src="pastores.png"
      style="width: 100%"
      alt="Pastores de la Iglesia mision Boston"
    />
  </div>

  <div class="container_vision">
    <h2 style="text-align: center; color: $primaryColor; font-size: 30px">Visión</h2>
    <div class="container_text_vision">
      <p>{{ vision }}</p>
    </div>
  </div>

  <div class="container_mision">
    <div class="container_text_mision">
      <h2
        style="
          text-align: center;
          color: $primaryColor;
          font-size: 30px;
          margin-bottom: 30px;
        "
      >
        Misión
      </h2>
      <p style="color: #fff">{{ mision }}</p>
    </div>
  </div>

  <div class="container_master">
    <div class="container_message">
      <b>Mensajes que </b> transforman, conectan y fortalecen tu fe.
    </div>

    <div class="container_message">
      <b>Llevanos contigo</b> a donde quiera que vayas
    </div>

    <div class="container_message">
      <b>comprometidos con</b> transformar vidas a través de la fe.
    </div>

    <div class="container_info">
      <div style="color: #fff; text-align: center">
        <h2 class="title_numbers">+ 8000</h2>
        <p class="subtitle_numbers">Sintonizantes</p>
      </div>

      <div style="color: #fff; text-align: center">
        <h2 class="title_numbers">+ 120</h2>
        <p style="height: auto" class="subtitle_numbers subtitle_ayudador">
          Ayudadores porcentuales
        </p>
      </div>

      <div style="color: #fff; text-align: center">
        <h2 class="title_numbers">20</h2>
        <p class="subtitle_numbers">Años</p>
      </div>
    </div>
  </div>
  <app-footer></app-footer>
</div>

<div class="container_principal">
  <h2 class="text_testimonio">Testimonios de vida</h2>

  <div class="testimonials_container">

    <div id="swiperTestimonios" class="swiper">
      <!-- Wrapper -->
      <div class="swiper-wrapper">
        <!-- Slides -->
        <div class="swiper-slide" *ngFor="let testimonio of testimonios">
          <div style="position: relative" class="card_testimonial">
            <p class="text_testimonio">
              {{ testimonio.description }}
            </p>
            <box-icon
              style="position: absolute; top: 80px; left: 20px; fill: #e8e8e8"
              type="solid"
              name="quote-alt-left"
            ></box-icon>
            <h2
              style="
                position: absolute;
                top: 430px;
                left: 100;
                z-index: 4;
                fill: #444;
                width: 200px;
                height: 50px;
                font-size: 1.3rem;
                font-weight: bold;
              "
            >
              {{ testimonio.author }}
            </h2>
            <svg
              style="position: absolute; bottom: 50px; width: 100%; left: 0%"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 1440 320"
            >
              <path
                fill="#e8e8e8"
                fill-opacity="1"
                d="M0,0L60,42.7C120,85,240,171,360,186.7C480,203,600,149,720,128C840,107,960,117,1080,128C1200,139,1320,149,1380,154.7L1440,160L1440,320L1380,320C1320,320,1200,320,1080,320C960,320,840,320,720,320C600,320,480,320,360,320C240,320,120,320,60,320L0,320Z"
              ></path>
            </svg>
            <div
              style="
                position: absolute;
                width: 100%;
                background: #e8e8e8;
                height: 51px;
                bottom: 0;
              "
            ></div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <div class="swiper-pagination"></div>
    </div>

  </div>
</div>
